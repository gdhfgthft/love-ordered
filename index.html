<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src=" https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2 "></script>
    <title>❤️ 宝贝的专属深夜食堂 ❤️</title>
    <style>
body {
            background-color: #ffe6e6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #212529; font-size: 24px; margin-bottom: 5px; font-weight: 700; }
        p.subtitle { color: #868e96; font-size: 14px; margin-bottom: 25px; }
        
        /* 大分类大盒子 */
        .category-box {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        
        /* 大分类的标题条（点击这里展开） */
        .category-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fdf2f4; /* 淡淡的优雅粉底色 */
            color: #ff6b6b;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            list-style: none;
            outline: none;
        }
        .category-title::-webkit-details-marker { display: none; }
        
        /* 展开时，大分类标题颜色加深，小箭头旋转 */
        .category-box[open] .category-title {
            background: #ff6b6b;
            color: white;
        }
        .category-box[open] .arrow {
            transform: rotate(180deg);
        }
        .arrow { transition: 0.3s; font-size: 12px; }

        /* 分类展开后的内容盒子 */
        .category-content {
            padding: 12px 12px 4px 12px;
            background: #fffafa;
        }

        /* 里面普通的菜单格子 */
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: white;
            border: 1px solid #f1f3f5;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: left;
        }
        .title { font-weight: 600; color: #495057; font-size: 15px; }
        .menu-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #ff6b6b;
            cursor: pointer;
        }
        
        /* 特殊：出门下馆子区域 */
        .special-item {
            flex-direction: column;
            align-items: stretch;
        }
        .special-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .price { font-size: 12px; color: #adb5bd; margin-top: 2px; }
        .menu-detail {
            font-size: 13px;
            color: #868e96;
            border-top: 1px dashed #f1f3f5;
            padding-top: 8px;
            margin-top: 4px;
        }

        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, #ff6b6b, #fa5252);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(250, 82, 82, 0.2);
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(250, 82, 82, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <h1>❤️ 专属食堂 ❤️</h1>
    <p>今晚想吃什么？勾选后一键召唤粥粥吧！</p>
    
<details class="category-box" open>

<details class="category-box">
    <summary class="category-title"><span>🥬 江江最爱的炒菜</span><span class="arrow">▼</span></summary>
    <div class="category-content">

        <div class="menu-item">

    <div class="menu-item">

<details class="category-box">

    <div class="category-content">

<details class="category-box">
        <summary class="category-title"><span>✨ 不知道吃什么！</span><span class="arrow">▼</span></summary>

<div style="text-align: center; margin-top: 30px;">
    <button id="chuoBtn" onclick="sendPoke()" style="background-color: #ff85a2; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        💖 隔空戳一戳男朋友
    </button>
</div>

    <button class="btn" onclick="order()">✨ 一键复制并召唤女朋友 ✨</button>
</div>

<script>
// 1. 初始化 Supabase 实例
const SUPABASE_URL = "https://rdaadekuspexkbcfploh.supabase.co";
const SUPABASE_KEY = "sb_publishable_59Dd4UwnmmbaOa8s4EYL1w_hfl3VHYI";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 2. 【发送端】点击一键召唤 —— 同样写入 chuo_records 表！
async function order() {
    let checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
    if(checkboxes.length === 0) {
        alert('宝子，你还没点菜呢！别饿着了~');
        return;
    }
    
    let foods = [];
    checkboxes.forEach(box => foods.push(box.value));
    
    const orderBtn = document.querySelector('.btn');
    const originalText = orderBtn.innerText;
    orderBtn.innerText = "🚀 正在秘密传送菜单...";
    orderBtn.disabled = true;

    // 重点：因为你只有 chuo_records 表，我们把菜品数据塞进 foods 字段（确保你表里有这个字段，或者直接塞进一个自定义字段）
    // 如果你的表只有默认的 id 和 created_at，建议在 Supabase 里给 chuo_records 表加一个叫 foods 的 text 或 json 字段
    const { error } = await client
        .from('chuo_records')
        .insert([{ foods: foods, type: 'order' }]); // 用 type='order' 区分

    if (error) {
        console.error("【订单发送失败】", error);
        alert(`召唤失败啦，原因: ${error.message}`);
        orderBtn.innerText = originalText;
        orderBtn.disabled = false;
    } else {
        orderBtn.innerText = "✨ 召唤成功！他收到啦！ ✨";
        setTimeout(() => {
            orderBtn.innerText = originalText;
            orderBtn.disabled = false;
        }, 2000);
    }
}

// 3. 【发送端】点击按钮“戳一戳” （这段保持不变，写的很好！）
async function sendPoke() {
    const btn = document.getElementById('chuoBtn');
    btn.innerText = "🚀 正在发射暴击...";
    btn.disabled = true;

    const { error } = await client
        .from('chuo_records')
        .insert([{ type: 'poke' }]); 

    if (error) {
        console.error("【发送失败日志】", error);
        alert(`发射失败，原因: ${error.message}`);
        btn.innerText = "💖 隔空戳一戳男朋友";
        btn.disabled = false;
    } else {
        btn.innerText = "✅ 戳成功啦！";
        setTimeout(() => {
            btn.innerText = "💖 隔空戳一戳男朋友";
            btn.disabled = false;
        }, 1500);
    }
}

function startHeartRain() {
    alert("爱心雨被调用了！");
}
const channelName = 'realtime-universal-channel';

client
  .channel(channelName)
  .on('postgres_changes', {
    event: 'INSERT',
    schema: 'public',
    table: 'chuo_records'
  }, payload => {
    console.log("云端雷达收到新信号:", payload.new);

    const type = payload.new.type;
    const rawFoods = payload.new.foods;
    const foods = rawFoods ? String(rawFoods).replace(/[\[\]"]/g, '') : '';

    if (type === 'order' && foods) {
      let alertText = foods.includes("下馆子")
        ? `📢 今天出门吃饭！🚗✨`
        : `🔔 菜单：${foods}`;

      alert(alertText);
      startHeartRain();
    } else {
      startHeartRain();
    }
  })
  .subscribe();


</script>
</body>
</html>
