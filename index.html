    <style>
body {
            background-color: #ffe6e6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            width: 90%;
            max-width: 400px;
            text-align: center;

        p.subtitle { color: #868e96; font-size: 14px; margin-bottom: 25px; }
        
        /* 大分类大盒子 */
        .category-box {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        
        /* 大分类的标题条（点击这里展开） */
        .category-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #fdf2f4; /* 淡淡的优雅粉底色 */
            color: #ff6b6b;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            list-style: none;
            outline: none;
        }
        .category-title::-webkit-details-marker { display: none; }
        
        /* 展开时，大分类标题颜色加深，小箭头旋转 */
        .category-box[open] .category-title {
            background: #ff6b6b;
            color: white;
        }
        .category-box[open] .arrow {
            transform: rotate(180deg);
        }
        .arrow { transition: 0.3s; font-size: 12px; }

        /* 分类展开后的内容盒子 */
        .category-content {
            padding: 12px 12px 4px 12px;
            background: #fffafa;
        }

        /* 里面普通的菜单格子 */
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: white;
            border: 1px solid #f1f3f5;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: left;
        }
        .title { font-weight: 600; color: #495057; font-size: 15px; }
        .menu-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #ff6b6b;
            cursor: pointer;
        }
        
        /* 特殊：出门下馆子区域 */
        .special-item {
            flex-direction: column;
            align-items: stretch;
        }
        .special-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .price { font-size: 12px; color: #adb5bd; margin-top: 2px; }
        .menu-detail {
            font-size: 13px;
            color: #868e96;
            border-top: 1px dashed #f1f3f5;
            padding-top: 8px;
            margin-top: 4px;
        }

        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, #ff6b6b, #fa5252);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(250, 82, 82, 0.2);
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(250, 82, 82, 0.3); }

<div style="text-align: center; margin-top: 30px;">
    <button id="chuoBtn" onclick="sendPoke()" style="background-color: #ff85a2; color: white; border: none; padding: 12px 24px; border-radius: 20px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        💖 隔空戳一戳男朋友
    </button>
</div>

    <button class="btn" onclick="order()">✨ 一键复制并召唤女朋友 ✨</button>

<script>
function order() {
    let checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
    if(checkboxes.length === 0) {
        alert('宝子，你还没点菜呢！别饿着了~');
        return;
    }
    
    let foods = [];
    checkboxes.forEach(box => foods.push(box.value));
    
    let text = "";
    if (foods.includes("下馆子")) {
        text = `📢 【重大通知】\n今天不想让粥粥做饭啦！\n我已经决定翻牌【出门下馆子】🚗✨\n请微信对面的粥粥立刻换好衣服，准备出发！冲鸭！`;
    } else {
        text = `你的宝贝下单啦！\n今晚翻牌子的菜单是：【${foods.join('、')}】\n请粥粥大人立刻前往厨房准备。😘`;
    }
    
    // 使用现代剪贴板 API，如果失败则降级使用旧方法
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            alert('🎉 订单复制成功！快去微信粘贴发给男朋友吧！');
        }).catch(err => {
            fallbackCopy(text);
        });
    } else {
        fallbackCopy(text);
    }
}

// 降级复制方案
function fallbackCopy(text) {
    let textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.top = "0";
    textArea.style.left = "0";
    textArea.style.width = "2em";
    textArea.style.height = "2em";
    textArea.style.background = "transparent";
    textArea.style.border = "none";
    
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    try {
        let successful = document.execCommand('copy');
        if (successful) {
            alert('🎉 订单复制成功！快去微信粘贴发给男朋友吧！');
        } else {
            alert('复制好像失败了，可以直接截图发给他哟~');
        }
    } catch (err) {
        alert('天呐，浏览器太严格了，手敲或截图发给他吧~');
    }
    document.body.removeChild(textArea);
}

// 1. 初始化 Supabase 实例
const SUPABASE_URL = "https://rdaadekuspexkbcfploh.supabase.co";
const SUPABASE_KEY = "sb_publishable_59Dd4UwnmmbaOa8s4EYL1w_hfl3VHYI";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 2. 【发送端】点击按钮往云端发送记事
async function sendPoke() {
    const btn = document.getElementById('chuoBtn');
    btn.innerText = "🚀 正在发射暴击...";
    btn.disabled = true;

    const { error } = await client
        .from('chuo_records')
        .insert([{}]); 

    if (error) {
        console.error("【发送失败日志】", error);
        alert(`发射失败，原因: ${error.message}\n请检查 RLS 策略或网络！`);
        btn.innerText = "💖 隔空戳一戳男朋友";
        btn.disabled = false;
    } else {
        btn.innerText = "✅ 戳成功啦！";
        setTimeout(() => {
            btn.innerText = "💖 隔空戳一戳男朋友";
            btn.disabled = false;
        }, 1500);
    }
}

// 3. 【接收端】开启大喇叭（这里已修正为 client）
client
    .channel('schema-db-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chuo_records' }, payload => {
        
        // 🌟 核心彩蛋：下爱心雨
        for (let i = 0; i < 60; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.innerText = ['💖', '❤️', '✨', '🔥', '🍕'][Math.floor(Math.random() * 5)];
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-50px';
                heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                heart.style.zIndex = '9999';
                heart.style.transition = 'transform 3s linear, opacity 3s linear';
                
                document.body.appendChild(heart);
                
                // 稍微延迟一点点确保 transition 生效
                setTimeout(() => {
                    heart.style.transform = `translateY(110vh) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);
                
                // 自动销毁
                setTimeout(() => heart.remove(), 3050);
            }, i * 100);
        }
        
    })
    // 🌟 优化后的：监听 实时订单提醒
supabase
  .channel('chuo_records') // 给频道起个名字
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chuo_records' }, payload => {
    
    // 1. 确保 foods 永远是一个数组，防止报错
    const rawFoods = payload.new.foods;
    const foods = Array.isArray(rawFoods) ? rawFoods : [rawFoods];
    
    // 2. 准备弹窗文案
    let alertText = "";
    if (foods.includes("下馆子")) {
        alertText = `📢 【重大通知】\n今天不想做饭啦！\n宝贝决定翻牌【出门下馆子】🚗✨\n请粥粥立刻换好衣服，准备出发！冲鸭！`;
    } else {
        alertText = `🔔 【食堂新订单】\n你的宝贝下单啦！\n今晚翻牌子的菜单是：\n👉 【${foods.join('、')}】\n请粥粥立刻前往厨房准备。😘`;
    }
    
    // 3. 弹出实时通知
    alert(alertText);
  })
  .subscribe();


</script>
